# ===================================
# Настройки подключения к PostgreSQL
# ===================================
db.url=jdbc:postgresql://localhost:5432/card_game_bd
db.username=postgres
db.password=postgres

# Схема, в которой лежат таблицы предметной области.
# Схема и таблицы должны быть созданы заранее вручную скриптами из папки db/ —
# приложение их не создаёт.
db.schema=card_game

# Размер колоды по правилам игры (правило "ровно N карт")
deck.requiredSize=60

# ===================================
# Пул соединений HikariCP
# ===================================
db.pool.maximumPoolSize=10
db.pool.minimumIdle=2
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000
